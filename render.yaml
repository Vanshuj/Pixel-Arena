services:
  # Backend API
  - type: web
    name: vibe-snapshot-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: vibe-snapshot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set this manually in Render dashboard to your backend URL
      - key: VITE_ADMIN_PASSWORD
        sync: false   # Set this manually in Render dashboard
